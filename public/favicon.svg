<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>
  <!-- House body -->
  <rect x="18" y="33" width="28" height="20" rx="1.5" fill="#c9a96e"/>
  <!-- Door -->
  <rect x="27" y="42" width="10" height="11" rx="1" fill="#1a1a2e"/>
  <!-- Roof -->
  <polygon points="32,13 10,35 54,35" fill="#c9a96e"/>
  <!-- Roof outline -->
  <polygon points="32,13 10,35 54,35" fill="none" stroke="#e8d5a3" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Chimney -->
  <rect x="40" y="20" width="5" height="10" rx="1" fill="#c9a96e"/>
  <!-- Window left -->
  <rect x="20" y="37" width="7" height="7" rx="1" fill="#1a1a2e" stroke="#e8d5a3" stroke-width="1"/>
  <!-- Window right -->
  <rect x="37" y="37" width="7" height="7" rx="1" fill="#1a1a2e" stroke="#e8d5a3" stroke-width="1"/>
  <!-- Door knob -->
  <circle cx="35" cy="48" r="1" fill="#c9a96e"/>
</svg>
